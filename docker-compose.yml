services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: prestasearch-backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - prestasearch

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prestasearch-frontend
    restart: unless-stopped
    ports:
      - "3033:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - prestasearch

networks:
  prestasearch:
    driver: bridge